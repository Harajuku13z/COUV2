[program:artisan-seo-horizon]
process_name=%(program_name)s
directory=/var/www/artisan-seo/current
command=/usr/bin/php artisan horizon
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/artisan-seo-horizon.log
stopwaitsecs=3600
